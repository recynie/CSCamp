#   "985"     985工程（含C9/华五）
#   "211"     211工程（含985）
#   双非    非211院校
#   四非    非985/"211"/独立学院/中外合作（数据错误时标注）
#   研究院  独立科研院所（中科院系等）
#   联培    联合培养项目
#   港澳    香港/澳门院校
#   AI强校  非985但AI/CS实力强
#
# aliases: 同一学校在不同数据源中出现的其他名称，
#          解析时统一映射到 name 字段的值
# ============================================================

