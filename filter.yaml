# ============================================================
# 夏令营数据筛选配置
# 这里的值决定网页端筛选器的【默认勾选状态】
# 用户可以在网页端自由调整，刷新页面后恢复默认值
# ============================================================

# 默认展示的学科类别（全部 4 类数据都会拉取，这里控制默认勾选哪些）
# 可选值: 理工类 | 经管类 | 文法类 | 医农类
default_categories:
  - 理工类

# 默认勾选的学校档次标签（来自 school_tags.yaml）
# 空列表 = 不按标签过滤（显示全部）
# 可选值: TOP2 | C9 | 华五 | 985 | 211 | 双非 | 研究院 | 联培 | 港澳 | AI强校
default_tags:
  - TOP2
  - C9
  - 华五
  - "985"
  - 研究院
  - 港澳
  - AI强校

# 默认是否显示已截止的通知
default_show_expired: false

# 默认是否显示截止日期为"暂无"的通知
default_show_unknown_deadline: true

# ============================================================
# 默认勾选的学校列表（仍然保留，可与 tags 联合使用）
# 空列表 = 不按学校名过滤
# ============================================================
default_schools: []
