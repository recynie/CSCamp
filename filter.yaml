# 修改此文件来调整哪些学校/通知会出现在网页上
# ============================================================

# 数据来源：只抓取哪些学科类别的 README
# 可选值: 理工类 | 经管类 | 文法类 | 医农类
categories:
  - 理工类

# 是否显示已截止的通知（截止日期已过，在原始数据中以 ~~日期~~ 表示）
