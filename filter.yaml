# ============================================================
# 夏令营数据筛选配置
# 这里的值决定网页端筛选器的【默认勾选状态】
# 用户可以在网页上自由调整，刷新页面后恢复默认值
# ============================================================

# 默认展示的学科类别（全部 4 类数据都会拉取，这里控制默认勾选哪些）
# 可选值: 理工类 | 经管类 | 文法类 | 医农类
default_categories:
  - 理工类

# 默认是否显示已截止的通知
default_show_expired: false

# 默认是否显示截止日期为"暂无"的通知
default_show_unknown_deadline: true

# ============================================================
# 默认勾选的学校列表
# 所有学校的数据都会存在 camps.json 中，
# 这里只控制"打开网页时默认勾选哪些学校"
# 分组仅用于可读性，不影响逻辑
# ============================================================
