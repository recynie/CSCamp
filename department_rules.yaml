# ============================================================
# 院系 → 专业大类映射规则
# 用于从夏令营标题中提取院系名并归类到专业大类
#
# groups 中的每个大类包含一组 keywords，
# 匹配时对提取出的院系名进行关键词包含匹配。
# 
# 匹配顺序：从上到下，第一个匹配的大类生效。
# 未匹配到任何明确专业的归入"其他"。
#
# 原则：
# 1. 只保留通用学科方向关键词，不出现具体学校/学院/研究所名
# 2. 交叉/创新创业用于收纳跨学科、创新类机构
# 3. 宁缺毋滥——不好归的就放"其他"
#
# 扩展方式：新增条目即可，无需修改代码。
# ============================================================

